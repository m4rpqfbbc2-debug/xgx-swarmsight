services:
  swarmsight:
    image: ghcr.io/666ghj/mirofish:latest
    container_name: swarmsight
    env_file:
      - .env
    ports:
      - "3002:3000"
      - "5002:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
      # Overlay our reskinned frontend
      - ./frontend/src:/app/frontend/src
      - ./frontend/index.html:/app/frontend/index.html
      # Overlay backend with our translated/fixed code
      - ./backend/app:/app/backend/app
      - ./backend/run.py:/app/backend/run.py
      - ./backend/scripts:/app/backend/scripts
